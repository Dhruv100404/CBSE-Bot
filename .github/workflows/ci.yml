name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Enable Corepack
        run: corepack enable
      - name: Install pnpm
        run: corepack prepare pnpm@10.0.0 --activate
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
      - name: Typecheck web
        run: pnpm --filter web typecheck

  api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Sync API deps
        run: uv sync --directory apps/api --dev
      - name: API compile check
        run: uv run --directory apps/api python -m compileall src

  worker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Sync worker deps
        run: uv sync --directory apps/worker --dev
      - name: Worker compile check
        run: uv run --directory apps/worker python -m compileall src

  compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate compose
        run: docker compose config
